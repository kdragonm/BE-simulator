<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BE 90% 신뢰구간 탐색기</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f3;
      color: #1a1a18;
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    h1 { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: #888; margin-bottom: 1.5rem; }
    .container { max-width: 720px; margin: 0 auto; }
    .card {
      background: #fff;
      border: 0.5px solid rgba(0,0,0,0.12);
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    .section-label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #888;
      margin-bottom: 12px;
    }
    .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
    .input-group label { display: block; font-size: 12px; color: #888; margin-bottom: 4px; }
    .input-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .input-row:last-child { margin-bottom: 0; }
    .row-label { font-size: 13px; color: #555; min-width: 70px; }
    .row-label span { font-size: 11px; color: #aaa; display: block; }
    input[type=range] {
      flex: 1; height: 4px; cursor: pointer;
      -webkit-appearance: none; appearance: none;
      background: #ddd; border-radius: 2px; outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 18px; height: 18px;
      border-radius: 50%; background: #1a1a18; cursor: pointer;
      border: 2px solid #fff; box-shadow: 0 0 0 1px rgba(0,0,0,0.2);
    }
    input[type=number] {
      border: 0.5px solid rgba(0,0,0,0.2); border-radius: 6px;
      padding: 5px 8px; font-size: 13px; outline: none;
      background: #fafafa; color: #1a1a18;
      transition: border-color 0.15s;
    }
    input[type=number]:focus { border-color: rgba(0,0,0,0.5); background: #fff; }
    .val-input { width: 68px; text-align: center; font-weight: 500; }
    .sub-inputs { display: flex; align-items: center; gap: 6px; }
    .sub-inputs input { width: 72px; }
    .metrics { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; margin-bottom: 1rem; }
    .metric {
      background: #f5f5f3; border-radius: 8px;
      padding: 10px 12px;
    }
    .metric-label { font-size: 11px; color: #888; margin-bottom: 4px; }
    .metric-val { font-size: 18px; font-weight: 500; color: #1a1a18; }
    .metric-val.pass { color: #0F6E56; }
    .metric-val.fail { color: #993C1D; }
    .chart-wrap { position: relative; }
    .legend {
      display: flex; flex-wrap: wrap; gap: 14px;
      font-size: 11px; color: #888; margin-top: 10px;
    }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
    .legend-line { width: 20px; height: 2px; }
    .legend-dash { width: 20px; height: 0; border-top: 2px dashed; }
    @media (max-width: 500px) {
      .input-grid { grid-template-columns: 1fr; }
      .metrics { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>BE 90% 신뢰구간 탐색기</h1>
  <p class="subtitle">생물학적 동등성 연구 — N과 표준편차 변화에 따른 90% CI 시각화</p>

  <div class="card">
    <p class="section-label">기본 설정</p>
    <div class="input-grid">
      <div class="input-group">
        <label>기준 log 평균 (log 시험약 − log 대조약)</label>
        <div style="display:flex;align-items:center;gap:8px;margin-top:4px;">
          <input type="number" id="logMean" value="-0.14276" step="0.001" style="width:110px;">
          <span style="font-size:12px;color:#888;">→ GMR = <strong id="gmrDisplay">0.8670</strong></span>
        </div>
      </div>
      <div class="input-group">
        <label>BE 허용 범위</label>
        <div class="sub-inputs" style="margin-top:4px;">
          <input type="number" id="lowerLimit" value="0.80" step="0.01">
          <span style="color:#aaa;">~</span>
          <input type="number" id="upperLimit" value="1.25" step="0.01">
        </div>
      </div>
    </div>

    <div>
      <div class="input-row">
        <div class="row-label">N <span>(명)</span></div>
        <input type="range" id="nSlider" min="6" max="120" value="33" step="1">
        <input type="number" id="nVal" class="val-input" value="33" min="6" max="500">
      </div>
      <div class="input-row">
        <div class="row-label">Std <span>(log 단위)</span></div>
        <input type="range" id="stdSlider" min="0.05" max="0.80" value="0.389792" step="0.001">
        <input type="number" id="stdVal" class="val-input" value="0.3898" min="0.01" max="2.0" step="0.001" style="width:76px;">
      </div>
    </div>
  </div>

  <div class="metrics">
    <div class="metric"><div class="metric-label">GMR</div><div class="metric-val" id="resGMR">—</div></div>
    <div class="metric"><div class="metric-label">90% 하한</div><div class="metric-val" id="resLow">—</div></div>
    <div class="metric"><div class="metric-label">90% 상한</div><div class="metric-val" id="resHigh">—</div></div>
    <div class="metric"><div class="metric-label">BE 판정</div><div class="metric-val" id="resPass">—</div></div>
  </div>

  <div class="card">
    <p class="section-label">90% 신뢰구간 (현재 N)</p>
    <div class="chart-wrap" style="height:72px;">
      <canvas id="ciChart" role="img" aria-label="현재 N에서의 90% 신뢰구간 막대"></canvas>
    </div>
  </div>

  <div class="card">
    <p class="section-label">N 변화에 따른 90% CI 추이</p>
    <div class="chart-wrap" style="height:260px;">
      <canvas id="trendChart" role="img" aria-label="N 변화에 따른 90% 신뢰구간 변화 추이 라인 차트"></canvas>
    </div>
    <div class="legend" style="margin-top:12px;">
      <span class="legend-item"><span class="legend-line" style="background:#378ADD;"></span>90% 하한</span>
      <span class="legend-item"><span class="legend-line" style="background:#D85A30;"></span>90% 상한</span>
      <span class="legend-item"><span class="legend-dash" style="border-color:#888;"></span>GMR</span>
      <span class="legend-item"><span class="legend-dash" style="border-color:rgba(160,80,0,0.7);"></span>BE 허용한계</span>
      <span class="legend-item"><span class="legend-line" style="background:rgba(100,100,100,0.4);border-top:2px dashed #aaa;"></span>현재 N</span>
    </div>
  </div>

  <p style="font-size:11px;color:#bbb;text-align:center;margin-top:0.5rem;">
    df = N−1 기반 t-임계값 적용 · SE = Std / √N · CI = exp(log평균 ± t·SE)
  </p>
</div>

<script>
function lnGamma(z) {
  const c = [76.18009172947146,-86.50532032941677,24.01409824083091,-1.231739572450155,0.1208650973866179e-2,-0.5395239384953e-5];
  let x=z,y=z,tmp=x+5.5;
  tmp=(x+0.5)*Math.log(tmp)-tmp;
  let ser=1.000000000190015;
  for(let j=0;j<6;j++){ser+=c[j]/++y;}
  return tmp+Math.log(2.5066282746310005*ser/x);
}
function betaInc(x,a,b){
  if(x<=0)return 0;if(x>=1)return 1;
  const lbeta=lnGamma(a)+lnGamma(b)-lnGamma(a+b);
  const front=Math.exp(Math.log(x)*a+Math.log(1-x)*b-lbeta)/a;
  let f=1,c=1,d=1-((a+b)*x/(a+1));
  if(Math.abs(d)<1e-30)d=1e-30;
  d=1/d;f=d;
  for(let m=1;m<=200;m++){
    let nm=m*(b-m)*x/((a+2*m-1)*(a+2*m));
    if(Math.abs(nm)<1e-30)nm=1e-30;
    d=1+nm*d;if(Math.abs(d)<1e-30)d=1e-30;
    c=1+nm/c;if(Math.abs(c)<1e-30)c=1e-30;
    d=1/d;f*=d*c;
    nm=-(a+m)*(a+b+m)*x/((a+2*m)*(a+2*m+1));
    if(Math.abs(nm)<1e-30)nm=1e-30;
    d=1+nm*d;if(Math.abs(d)<1e-30)d=1e-30;
    c=1+nm/c;if(Math.abs(c)<1e-30)c=1e-30;
    d=1/d;const delta=d*c;f*=delta;
    if(Math.abs(delta-1)<1e-10)break;
  }
  return front*f;
}
function betaIncReg(x,a,b){
  if(x<(a+1)/(a+b+2))return betaInc(x,a,b);
  return 1-betaInc(1-x,b,a);
}
function tQuantile(p,df){
  if(p<=0)return -Infinity;if(p>=1)return Infinity;
  let lo=-50,hi=50,mid;
  for(let i=0;i<100;i++){
    mid=(lo+hi)/2;
    const cdf=1-0.5*betaIncReg(df/(df+mid*mid),df/2,0.5);
    if(cdf<p)lo=mid;else hi=mid;
    if(hi-lo<1e-8)break;
  }
  return mid;
}
function calcCI(n,std,logMean){
  const df=n-1;
  const se=std/Math.sqrt(n);
  const t=tQuantile(0.95,df);
  return {lo:Math.exp(logMean-t*se),hi:Math.exp(logMean+t*se),gmr:Math.exp(logMean)};
}

let ciChart, trendChart;

function getInputs(){
  return {
    n: parseInt(document.getElementById('nVal').value)||33,
    std: parseFloat(document.getElementById('stdVal').value)||0.3898,
    logMean: parseFloat(document.getElementById('logMean').value)||-0.14276,
    ll: parseFloat(document.getElementById('lowerLimit').value)||0.80,
    ul: parseFloat(document.getElementById('upperLimit').value)||1.25
  };
}

function update(){
  const {n,std,logMean,ll,ul}=getInputs();
  const {lo,hi,gmr}=calcCI(n,std,logMean);
  const pass=lo>=ll&&hi<=ul;

  document.getElementById('gmrDisplay').textContent=gmr.toFixed(4);
  document.getElementById('resGMR').textContent=gmr.toFixed(4);
  document.getElementById('resLow').textContent=lo.toFixed(4);
  document.getElementById('resHigh').textContent=hi.toFixed(4);
  const resEl=document.getElementById('resPass');
  resEl.textContent=pass?'PASS':'FAIL';
  resEl.className='metric-val '+(pass?'pass':'fail');

  const xMin=Math.min(0.6,ll-0.1,lo-0.05);
  const xMax=Math.max(1.5,ul+0.1,hi+0.05);

  if(ciChart)ciChart.destroy();
  const ciCtx=document.getElementById('ciChart').getContext('2d');
  ciChart=new Chart(ciCtx,{
    type:'bar',
    data:{labels:[''],datasets:[
      {data:[hi-lo],backgroundColor:pass?'#1D9E75':'#D85A30',borderColor:pass?'#0F6E56':'#993C1D',borderWidth:1,borderRadius:3,base:lo}
    ]},
    options:{
      indexAxis:'y',responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:()=>`CI: [${lo.toFixed(4)}, ${hi.toFixed(4)}]  GMR: ${gmr.toFixed(4)}`}}},
      scales:{
        x:{min:xMin,max:xMax,grid:{color:'rgba(0,0,0,0.06)'},ticks:{callback:v=>v.toFixed(2),font:{size:11}}},
        y:{display:false}
      },animation:{duration:200}
    },
    plugins:[{id:'o',afterDraw(chart){
      const {ctx,chartArea:{top,bottom},scales:{x}}=chart;
      const lx=x.getPixelForValue(ll),ux=x.getPixelForValue(ul),gx=x.getPixelForValue(gmr);
      const lox=x.getPixelForValue(lo),hix=x.getPixelForValue(hi);
      const mid=(top+bottom)/2;
      ctx.save();
      ctx.strokeStyle='rgba(160,80,0,0.7)';ctx.lineWidth=1.5;ctx.setLineDash([4,3]);
      ctx.beginPath();ctx.moveTo(lx,top-4);ctx.lineTo(lx,bottom+4);ctx.stroke();
      ctx.beginPath();ctx.moveTo(ux,top-4);ctx.lineTo(ux,bottom+4);ctx.stroke();
      ctx.setLineDash([]);
      ctx.strokeStyle=pass?'#0F6E56':'#993C1D';ctx.lineWidth=2;
      [lox,hix].forEach(px=>{ctx.beginPath();ctx.moveTo(px,mid-7);ctx.lineTo(px,mid+7);ctx.stroke();});
      ctx.fillStyle=pass?'#0F6E56':'#993C1D';
      ctx.beginPath();ctx.arc(gx,mid,5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(140,70,0,0.85)';ctx.font='11px sans-serif';ctx.textAlign='center';
      ctx.fillText(ll.toFixed(2),lx,top-6);ctx.fillText(ul.toFixed(2),ux,top-6);
      ctx.restore();
    }}]
  });

  const maxN=Math.max(120,n+20);
  const step=Math.ceil(maxN/60);
  const nArr=[],loArr=[],hiArr=[];
  for(let ni=6;ni<=maxN;ni+=step){
    const r=calcCI(ni,std,logMean);
    nArr.push(ni);loArr.push(parseFloat(r.lo.toFixed(4)));hiArr.push(parseFloat(r.hi.toFixed(4)));
  }

  if(trendChart)trendChart.destroy();
  const tCtx=document.getElementById('trendChart').getContext('2d');
  trendChart=new Chart(tCtx,{
    type:'line',
    data:{labels:nArr,datasets:[
      {label:'90% 하한',data:loArr,borderColor:'#378ADD',borderWidth:2,pointRadius:0,fill:false,tension:0.3},
      {label:'90% 상한',data:hiArr,borderColor:'#D85A30',borderWidth:2,pointRadius:0,fill:false,tension:0.3},
      {label:'GMR',data:nArr.map(()=>parseFloat(gmr.toFixed(4))),borderColor:'#aaa',borderWidth:1.5,borderDash:[4,3],pointRadius:0,fill:false}
    ]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false,callbacks:{label:ctx=>`${ctx.dataset.label}: ${ctx.parsed.y.toFixed(4)}`}}},
      scales:{
        x:{title:{display:true,text:'N (명)',font:{size:12}},grid:{color:'rgba(0,0,0,0.05)'},ticks:{maxTicksLimit:12,font:{size:11}}},
        y:{title:{display:true,text:'비율',font:{size:12}},grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{size:11},callback:v=>v.toFixed(2)}}
      },animation:{duration:150}
    },
    plugins:[{id:'be',afterDraw(chart){
      const {ctx,chartArea:{left,right,top,bottom},scales:{x,y}}=chart;
      const lly=y.getPixelForValue(ll),uly=y.getPixelForValue(ul);
      const nx=x.getPixelForValue(n);
      ctx.save();
      ctx.strokeStyle='rgba(160,80,0,0.55)';ctx.lineWidth=1.2;ctx.setLineDash([5,4]);
      ctx.beginPath();ctx.moveTo(left,lly);ctx.lineTo(right,lly);ctx.stroke();
      ctx.beginPath();ctx.moveTo(left,uly);ctx.lineTo(right,uly);ctx.stroke();
      ctx.setLineDash([3,3]);ctx.strokeStyle='rgba(100,100,100,0.45)';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(nx,top);ctx.lineTo(nx,bottom);ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle='rgba(140,70,0,0.75)';ctx.font='11px sans-serif';ctx.textAlign='right';
      ctx.fillText(ll.toFixed(2),right-4,lly-4);
      ctx.fillText(ul.toFixed(2),right-4,uly+12);
      ctx.restore();
    }}]
  });
}

function sync(sliderId,inputId,min,max){
  const s=document.getElementById(sliderId),i=document.getElementById(inputId);
  s.addEventListener('input',()=>{i.value=parseFloat(s.value);update();});
  i.addEventListener('input',()=>{let v=parseFloat(i.value);if(isNaN(v))return;v=Math.min(max,Math.max(min,v));s.value=v;update();});
}
sync('nSlider','nVal',6,500);
sync('stdSlider','stdVal',0.05,0.80);
document.getElementById('logMean').addEventListener('input',update);
document.getElementById('lowerLimit').addEventListener('input',update);
document.getElementById('upperLimit').addEventListener('input',update);
update();
</script>
</body>
</html>
